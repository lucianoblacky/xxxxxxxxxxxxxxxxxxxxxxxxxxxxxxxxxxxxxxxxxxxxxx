<style>
:root{
  --bg:#f4f2ed; --ink:#1c1c1c; --ink-soft:#1c1c1cb3; --ink-muted:#5f5a51;
  --gold-1:#7a5a23; --gold-2:#caa544; --gold-3:#f0d889; --line:#dcdcdc;
  --font-heading:"Instrument Sans", ui-sans-serif, system-ui, sans-serif;
  --font-body:"Nunito", ui-sans-serif, system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{ background:var(--bg); color:var(--ink); font-family:var(--font-body); font-size:16px; line-height:1.6; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1.25rem; }
h1{font-family:var(--font-heading); margin:0; font-weight:800;}
p{margin:0;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
.cancel-card{ background:#fff; border-radius:1rem; padding:2.6rem 2rem; max-width:30rem; width:100%; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.06); }
.cancel-card__icon{ width:4rem; height:4rem; border-radius:50%; background:#fdeceb; display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin:0 auto 1.2rem; }
.cancel-card h1{ font-size:1.5rem; margin-bottom:0.7rem; }
.cancel-card p{ color:var(--ink-soft); font-size:0.95rem; margin-bottom:1.8rem; }
.cancel-actions{ display:flex; flex-direction:column; gap:0.7rem; }
.btn-gold{
  display:inline-flex; align-items:center; justify-content:center; gap:0.5rem;
  background:linear-gradient(90deg,var(--gold-1) 0%,var(--gold-2) 25%,var(--gold-3) 50%,var(--gold-2) 75%,var(--gold-1) 100%);
  color:#2a1f08; font-weight:800; font-size:0.92rem; padding:0.85rem 1.5rem; border-radius:0.5rem;
}
.btn-outline{ border:1px solid var(--line); color:var(--ink); font-weight:700; font-size:0.9rem; padding:0.85rem 1.5rem; border-radius:0.5rem; }
.cancel-card__logo{ height:1.8rem; margin:0 auto 1.6rem; }
</style>
</head>
<body>

<div class="cancel-card">
  <img src="images/logo_website.png" alt="PeakModo" class="cancel-card__logo">
  <div class="cancel-card__icon">✕</div>
  <h1>Payment Cancelled</h1>
  <p>Your payment was not completed and you have not been charged. Your cart is still saved — you can come back and complete your purchase anytime.</p>
  <div class="cancel-actions">
    <a href="checkout.html" class="btn-gold">Back to Checkout</a>
    <a href="index.html" class="btn-outline">Back to Shop</a>
  </div>
</div>

</body>
