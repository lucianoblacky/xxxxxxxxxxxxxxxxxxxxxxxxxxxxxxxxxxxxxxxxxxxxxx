<script>
const REVIEWS_PER_PAGE = 9;
let reviewsShown = 0;

function starString(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderReviews() {
  const grid = document.getElementById('review-grid');
  const next = REVIEWS_DATA.slice(reviewsShown, reviewsShown + REVIEWS_PER_PAGE);
  next.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = `
      <div class="review-card__top">
        <span class="review-card__name">${r.name}</span>
        <span class="stars">${starString(r.stars)}</span>
      </div>
      <div class="review-card__date">vor ${r.days_ago} Tagen</div>
      <p class="review-card__text">${r.text}</p>
      ${r.verified ? '<div class="review-card__verified">✓ Verifizierter Kauf</div>' : ''}
    `;
    grid.appendChild(card);
  });
  reviewsShown += next.length;

  const btn = document.getElementById('reviews-loadmore');
  if (reviewsShown >= REVIEWS_DATA.length) {
    btn.style.display = 'none';
  }
  document.getElementById('review-count-label').textContent = `Basierend auf ${REVIEWS_DATA.length} Bewertungen`;
}

document.getElementById('reviews-loadmore').addEventListener('click', renderReviews);
renderReviews();

document.getElementById('sentuel-add-to-cart').addEventListener('click', (e) => {
  e.preventDefault();
  alert('Produkt wird zum Warenkorb hinzugefügt (Integration mit dem bestehenden Cart-System folgt).');
});
</script>

</body>
