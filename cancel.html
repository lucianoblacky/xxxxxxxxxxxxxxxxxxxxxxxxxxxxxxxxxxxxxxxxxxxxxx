<!-- Meta Conversions API helper (shared across all pages) -->
<script>
window.pmMetaCapi = (function () {
  function getCookie(name) {
    const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return match ? decodeURIComponent(match[2]) : undefined;
  }

  function makeEventId() {
    return (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : (Date.now() + '-' + Math.random().toString(36).slice(2));
  }

  // Sends the event payload to meta-capi. Uses navigator.sendBeacon
  // when available so the request survives an immediate page
  // navigation/redirect right after this call (e.g. window.location.href
  // straight after tracking InitiateCheckout or Purchase) — a plain
  // fetch() can be aborted mid-flight by the browser in that situation,
  // silently dropping the event. sendBeacon is fire-and-forget by
  // design (no response is readable), which is fine here since the
  // caller never needs the response body. Falls back to fetch with
  // keepalive when sendBeacon is unavailable or rejects the payload
  // (e.g. payload too large), and a request failure here never throws —
  // analytics delivery is always best-effort and never blocks the
  // calling page's own flow (checkout, navigation, etc.).
  function sendEvent(payload) {
    try {
      const json = JSON.stringify(payload);
      if (navigator.sendBeacon) {
        const blob = new Blob([json], { type: 'application/json' });
        const ok = navigator.sendBeacon('/.netlify/functions/meta-capi', blob);
        if (ok) return;
      }
    } catch (err) {
      // fall through to fetch below
    }
    try {
      fetch('/.netlify/functions/meta-capi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        keepalive: true,
      }).catch(function (err) {
        console.error('meta-capi request failed:', err);
      });
    } catch (err) {
      console.error('meta-capi request failed:', err);
    }
  }

  function track(eventName, customData, customerData) {
    const eventId = makeEventId();

    if (typeof fbq === 'function') {
      fbq('track', eventName, customData || {}, { eventID: eventId });
    }

    const fbp = getCookie('_fbp');
    const fbc = getCookie('_fbc');

    sendEvent({
      eventName: eventName,
      eventId: eventId,
      eventSourceUrl: window.location.href,
      customData: customData || {},
      userData: Object.assign({ fbp: fbp, fbc: fbc }, customerData || {}),
    });

    return eventId;
  }

  function trackServerOnly(eventName, eventId, customData, customerData) {
    const fbp = getCookie('_fbp');
    const fbc = getCookie('_fbc');
    sendEvent({
      eventName: eventName,
      eventId: eventId,
      eventSourceUrl: window.location.href,
      customData: customData || {},
      userData: Object.assign({ fbp: fbp, fbc: fbc }, customerData || {}),
    });
  }

  return { track: track, trackServerOnly: trackServerOnly, getCookie: getCookie, makeEventId: makeEventId };
})();

pmMetaCapi.trackServerOnly('PageView', __pmPageViewEventId, {});
</script>
