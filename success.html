<style>

  --bg:#f4f2ed; --ink:#1c1c1c; --ink-soft:#1c1c1cb3; --ink-muted:#5f5a51;

<body>

<div class="success-card">
  <img src="images/logo_website.png" alt="PeakModo" class="success-card__logo">
  <div class="success-card__icon">✓</div>
  <h1>Thank you for your order!</h1>
  <p>We've received your payment and are getting your order ready to ship. You'll receive a confirmation by email shortly.</p>
  <div class="success-card__order-id" id="order-id-box" style="display:none;">
    Order number: <strong id="order-id-value"></strong>
  </div>
  <div class="success-actions">
    <a href="index.html" class="btn-gold">Back to Shop</a>
    <a href="hidden-truth-about-ashwagandha.html#kontakt" class="btn-outline">Question about your order?</a>
  </div>
</div>

<script>
// Determine which payment provider sent us here and grab the order/session id.
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');     // present on Stripe redirect success
const provider = params.get('provider');         // 'paypal' when coming from the PayPal flow
const paypalOrderId = params.get('order_id');    // present on PayPal flow

const orderIdBox = document.getElementById('order-id-box');
const orderIdValue = document.getElementById('order-id-value');

if (sessionId) {
  orderIdValue.textContent = sessionId;
  orderIdBox.style.display = 'block';
} else if (provider === 'paypal' && paypalOrderId) {
  orderIdValue.textContent = paypalOrderId;
  orderIdBox.style.display = 'block';
}

// ----------------------------------------------------------------------
// Purchase tracking.
//
// For PayPal, the Purchase event already fires in checkout.html right
// before this redirect (see trackPurchase() in the onApprove handler),
// because checkout.html still has the cart contents in memory at that
// point. This page does NOT re-fire it for PayPal, to avoid double
// counting the same order.
//
// For Stripe, the shopper leaves our site entirely for Stripe's hosted
// checkout page, so by the time they land back here, sessionStorage may
// already be empty and checkout.html's JS is long gone. This page is
// therefore the only place a Stripe Purchase event can be fired. We use
// a one-time flag so a page refresh doesn't fire Purchase twice for the
// same session.
// ----------------------------------------------------------------------
if (sessionId && typeof fbq === 'function') {
  const trackedKey = 'peakmodo_purchase_tracked_' + sessionId;
  if (!sessionStorage.getItem(trackedKey)) {
    let cartItems = [];
    try {
      const raw = sessionStorage.getItem('peakmodo_checkout_cart');
      cartItems = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(cartItems)) cartItems = [];
    } catch (e) {
      cartItems = [];
    }
    const value = cartItems.reduce((sum, i) => sum + i.unitPrice * i.qty, 0);
    fbq('track', 'Purchase', {
      content_ids: cartItems.map((i) => i.id),
      content_type: 'product',
      num_items: cartItems.reduce((sum, i) => sum + i.qty, 0),
      value: value,
      currency: 'EUR',
      order_id: sessionId,
    });
    sessionStorage.setItem(trackedKey, '1');
  }
}

// Clear the cart now that the order is placed, for both providers.
sessionStorage.removeItem('peakmodo_checkout_cart');
</script>
